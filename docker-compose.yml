services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: thinq_user
      POSTGRES_PASSWORD: thinq_password
      POSTGRES_DB: thinqshop_db
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thinq_user -d thinqshop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "7000:7000"
    environment:
      NODE_ENV: production
      PORT: 7000
      DATABASE_URL: postgresql://thinq_user:thinq_password@db:5432/thinqshop_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-thinq_jwt_secret}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:7000
        NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY:-}
    restart: always
    ports:
      - "7001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Server-side API proxy targets backend container
      BACKEND_URL: http://backend:7000
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
