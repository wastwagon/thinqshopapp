# ThinQShop — Coolify Docker Compose (full stack: db + backend + web)
# Coolify looks for /docker-compose.yaml by default.
#
# Set these env vars in Coolify → Application → Environment:
#   POSTGRES_PASSWORD, JWT_SECRET, PAYSTACK_SECRET_KEY, NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY,
#   FRONTEND_URL, NEXT_PUBLIC_API_URL

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: thinq_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: thinqshop_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thinq_user -d thinqshop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 7000
      DATABASE_URL: postgresql://thinq_user:${POSTGRES_PASSWORD}@db:5432/thinqshop_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:7000/health',r=>process.exit(r.statusCode===200?0:1))\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
