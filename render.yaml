# Render Blueprint — ThinQShop
# https://render.com/docs/blueprint-spec
# Connect this repo in Render Dashboard and use "New > Blueprint" to create all services.
#
# api-build/ is a tracked dir (see api-build/.gitkeep) so Render includes it in the deploy artifact.
# If deploy fails, ensure Build/Start in Render Dashboard match the values below.

databases:
  - name: thinqshop-db
    databaseName: thinqshop_db
    plan: free
    region: oregon

services:
  # NestJS API (backend)
  - type: web
    name: thinqshop-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate --schema=database/schema.prisma && npm run build -w backend && rm -rf api-build/* && cp -r backend/dist/* api-build/
    startCommand: npx prisma migrate deploy --schema=database/schema.prisma && node api-build/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 7000
      - key: DATABASE_URL
        fromDatabase:
          name: thinqshop-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Next.js frontend (web)
  - type: web
    name: thinqshop-web
    runtime: node
    region: oregon
    plan: free
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY
        sync: false
